<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Order Form - NIDDIAS</title>
        <style>
            body { font-family: Arial, sans-serif; max-width: 560px; margin: 30px auto;}
            label {display: inline-block; margin-top: 12px; font-weight: bold;}
            input, select, textarea { margin-top:4px; }
        </style>
    </head>
    <body>
        <form action="thankyou.html" method="get">
        <h1>NIDDIAS- Secure Checkout </h1>
        <p>1.SHIPPING INFORMATION</p>
        <label for="custname">Your Name:</label><br>
        <input type="text" name="custname" id="custname" size="30">
        <br>
        <label for="contact">Contact Number:</label>
        <br>
        <input type="text" name="contact" id="contact" size="30"><br>
        <label for="address">Address/Postal Code</label>
        <br>
        <input type="text" name="custname"
        id="custname" size="30"><br>
        <p><label for="Country And City">Country And City:</label></p>
        <select name="Country And City" id="Country And City">
            <option value="Singapore">Singapore</option>
            <option value="Malaysia">Malaysia</option>
            <option value="Indonesia">Indonesia</option>
            <option value="Thailand">Thailand</option>
            <option value="Vietnam">Vietnam</option>
        </select>
        <input type="text" name="custname"
        id="custname" size="30"><br>
        <p><strong>Select Delivery Method</strong></p>
        <label><input type="radio" name="delivery" value="standard" checked> Standard</label>
        <label><input type="radio" name="delivery" value="express"> Express +$10</label>
        <br>
        <br>
        <label for="custname">Email:</label>
        <input type="email" name="email" id="email"
        placeholder="you@exapmple.com"
        required><br>
        <p><strong>MEMBER:</strong></p>
        <label><input type="checkbox" name="Join NIDDIAS PLUS and save your delivery details for faster checkout." value="yes"> Join NIDDIAS PLUS and save your delivery details for faster checkout.</label>
        <p>2.PAYMENT INFORMATION</p>
        <label for="custname">Card Number:</label>
        <br>
        <input type="text" name="custname"
        id="custname" size="30"><br>
        <label for="custname">Expiry Date:</label>
        <input type="date" name="expiry" id="expiry"><br>
        <br>
        <label for="custname">CVV:</label>
        <input type="number" name="qtv"
        min="001" max="999" value="000"><br>
        <input type="submit" value="Place Order">
 <input type="Reset" value="Clear Form">
        </form>
    </body>
</html>
