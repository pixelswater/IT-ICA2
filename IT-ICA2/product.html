<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Catalogue</title>
    <style>
        table { border: collapse; margin: 0 auto; }
        th, td { border: 1px solid black; padding: 8px; }
        th { background-color: #f2f2f2; }
        body { font-family: Arial, sans-serif; max-width: 560px; margin: 60px auto; text-align: center; }
    </style>
</head>
<body>
    <h1>Product Catalogue 🛒</h1>

    <table>
        <tr>
            <th>Racket</th>
            <th>Boxing gloves</th>
        </tr>

            <td><img src="racket.jpeg" alt="Racket" width="200"></td>
            <td><img src="boxing glove.jpeg" alt="Boxing glove" width="200"></td>
        </tr>
        <tr>
            <th>Shoes</th>
            <th>Shirt</th>
        </tr>
        <tr>
            <td><img src="shoe.jpeg" alt="shoes" width=200></td>
            <td><img src="shirt.webp" alt="shirt" width=200></td>
        </tr>
    </table>
</body>
</html>
